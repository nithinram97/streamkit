apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: streamkit
  annotations:
    # Runs once on apply; re-run by deleting and re-applying
    helm.sh/hook: post-install,post-upgrade
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h postgres -U postgres; do echo "waiting…"; sleep 2; done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
      containers:
        - name: migrate
          image: ghcr.io/YOUR_ORG/streamkit-server:latest   # ← update
          command: ["node", "src/db/migrate.js"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: database-url
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: streamkit
  labels:
    app: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: ghcr.io/YOUR_ORG/streamkit-server:latest   # ← update
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: database-url
            - name: CLICKHOUSE_URL
              value: http://clickhouse-svc:8123
            - name: CLICKHOUSE_DB
              value: streamkit
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: username
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secret
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: streamkit
spec:
  selector:
    app: server
  ports:
    - port: 3000
      targetPort: 3000
