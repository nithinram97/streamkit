# ⚠️  DO NOT commit real values. Use `kubectl create secret` or a secrets manager.
# This is a template — replace <base64-encoded-value> with:
#   echo -n 'your-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: streamkit
type: Opaque
data:
  username: cG9zdGdyZXM=        # postgres
  password: Y2hhbmdlbWU=        # changeme  ← CHANGE THIS
---
apiVersion: v1
kind: Secret
metadata:
  name: server-secret
  namespace: streamkit
type: Opaque
data:
  jwt-secret: c3VwZXItc2VjcmV0LWNoYW5nZS1tZQ==   # super-secret-change-me  ← CHANGE THIS
---
# ClickHouse credentials
# password-sha256: echo -n 'yourpassword' | sha256sum | awk '{print $1}' | xxd -r -p | base64
apiVersion: v1
kind: Secret
metadata:
  name: clickhouse-secret
  namespace: streamkit
type: Opaque
data:
  username: ZGVmYXVsdA==              # default
  password: Y2hhbmdlbWU=              # changeme  ← CHANGE THIS
  password-sha256: ""                 # base64(sha256(password)) ← CHANGE THIS
